<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page || GitHub Issues Tracker</title>
    <!--  FavIcon-->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- Daisy Ui And Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome Link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Font Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!--Css Link -->
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <!-- Header Section -->
    <header class="bg-white">
      <div class="navbar bg-base-100 shadow-sm px-20">
        <div class="flex-1">
          <a class="btn btn-ghost text-xl">
            <img
              src="./assets/github-logo.png"
              alt="Header logo"
              class="max-w-11/12 w-8 mr-2"
            />
            <span>GitHub Issues Tracker</span>
          </a>
        </div>
        <div class="flex gap-2">
          <div class="flex items-center border px-2 rounded-lg gap-0">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input
              type="text"
              placeholder="Search issues..."
              class="input input-bordered w-24 md:w-auto outline-none border-none focus:border-none focus:ring-0 focus:outline-none"
            />
          </div>

          <div class="w-full">
            <button class="btn btn-primary w-full">
              <i class="fa-solid fa-plus"></i> New Issue
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Js link -->
    <script src="./script/script.js"></script>
  </body>
</html>
